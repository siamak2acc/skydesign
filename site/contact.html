<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact | SkyDesign</title>
  <meta name="description" content="Contact SkyDesign about flight deal partnerships, affiliate setup, or website enquiries.">
  <link rel="canonical" href="https://skydesign.com.au/contact/">
  <link rel="stylesheet" href="/assets/style.css">
  <script src="/assets/script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">SkyDesign</a>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">Menu</button>
    <nav class="site-nav" id="site-nav" aria-label="Primary navigation">
      <a href="/">Home</a>
      <a href="/flight-deals/">Flight Deal Finder</a>
      <a href="/cheap-flights/">Cheap Flights</a>
      <a href="/about/">About</a>
      <a aria-current="page" href="/contact/">Contact</a>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <p class="eyebrow">Contact</p>
      <h1>Contact SkyDesign</h1>
      <p>For affiliate partnerships, travel content, or website enquiries, contact the SkyDesign team.</p>
    </section>

    <section class="contact-panel">
      <div>
        <h2>Partnership enquiries</h2>
        <p>Email <a href="mailto:hello@skydesign.com.au">hello@skydesign.com.au</a></p>
      </div>
      <form class="contact-form" action="mailto:hello@skydesign.com.au" method="post" enctype="text/plain">
        <label>
          <span>Name</span>
          <input name="name" type="text" autocomplete="name">
        </label>
        <label>
          <span>Email</span>
          <input name="email" type="email" autocomplete="email">
        </label>
        <label>
          <span>Message</span>
          <textarea name="message" rows="5"></textarea>
        </label>
        <button class="button primary" type="submit">Send enquiry</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <span>SkyDesign Flight Deal Finder</span>
    <a href="/sitemap.xml">Sitemap</a>
  </footer>
</body>
</html>
